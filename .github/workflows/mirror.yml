name: Mirror Repository

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source with full history
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MIRROR_DVN }}

      # Step 2: Configure git
      - name: Configure git
        run: |
          git config --global user.name "legitem2023"
          git config --global user.email "your-email@example.com"

      # Step 3: Push using mirror (THIS IS THE KEY CHANGE)
      - name: Mirror to destination
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_DVN }}
        run: |
          git push --mirror https://legitem2023:${MIRROR_TOKEN}@github.com/vendorcity2026-source/VendorCity.git
